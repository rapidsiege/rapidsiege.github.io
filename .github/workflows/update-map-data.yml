name: Update TW map data

on:
  schedule:
    # Every 2 hours (UTC). Offset from the top of the hour — GitHub delays
    # busy slots like :00 by a lot more.
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download map files
        run: |
          # Mirrored worlds (space-separated). Adding a world here is all the mirror
          # needs; the calculators' World dropdown + speeds follow via worlds.json below.
          worlds="es100"
          manifest='{}'
          for w in $worlds; do
            base="https://$w.guerrastribales.es"
            out="tw-scripts/data/$w"
            mkdir -p "$out"
            for f in village.txt player.txt ally.txt conquer.txt \
                     kill_att.txt kill_def.txt kill_sup.txt kill_all.txt \
                     kill_att_tribe.txt kill_def_tribe.txt kill_all_tribe.txt kill_sup_tribe.txt; do
              curl -fsSL --retry 3 --retry-delay 10 "$base/map/$f" -o "$out/$f"
            done
            # get_conquer only accepts a `since` up to 24h in the past — use 23h
            since=$(( $(date +%s) - 82800 ))
            curl -fsSL --retry 3 --retry-delay 10 \
              "$base/interface.php?func=get_conquer&since=$since" -o "$out/conquer_recent.txt"
            for q in get_config get_unit_info get_building_info; do
              curl -fsSL --retry 3 --retry-delay 10 \
                "$base/interface.php?func=$q" -o "$out/$q.xml"
            done
            date -u +"%Y-%m-%dT%H:%M:%SZ" > "$out/last-updated.txt"
            # Pull the world speeds out of get_config.xml for the manifest
            speed=$(grep -oPm1 '(?<=<speed>)[0-9.]+' "$out/get_config.xml" || true)
            us=$(grep -oPm1 '(?<=<unit_speed>)[0-9.]+' "$out/get_config.xml" || true)
            manifest=$(jq -c --arg w "$w" --argjson s "${speed:-null}" --argjson u "${us:-null}" \
              '.[$w] = {speed: $s, unitSpeed: $u}' <<< "$manifest")
          done
          # Manifest of mirrored worlds + their speeds — the calculators' World
          # dropdown and travel-time math read this (data/worlds.json)
          echo "$manifest" > tw-scripts/data/worlds.json

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- tw-scripts/data ':(exclude)tw-scripts/data/*/last-updated.txt'
          if git diff --cached --quiet; then
            echo "Map data unchanged; nothing to commit."
            exit 0
          fi
          git add -- 'tw-scripts/data/*/last-updated.txt'
          git commit -m "Update TW map data"
          git push
