name: Update TW map data

on:
  schedule:
    # Every 2 hours (UTC). Offset from the top of the hour — GitHub delays
    # busy slots like :00 by a lot more.
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download map files
        run: |
          mkdir -p tw-scripts/data/es100
          for f in village.txt player.txt; do
            curl -fsSL --retry 3 --retry-delay 10 \
              "https://es100.guerrastribales.es/map/$f" \
              -o "tw-scripts/data/es100/$f"
          done
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tw-scripts/data/es100/last-updated.txt

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- tw-scripts/data/es100/village.txt tw-scripts/data/es100/player.txt
          if git diff --cached --quiet; then
            echo "Map data unchanged; nothing to commit."
            exit 0
          fi
          git add tw-scripts/data/es100/last-updated.txt
          git commit -m "Update es100 map data"
          git push
